<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Cine - Mi Lista</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <header class="header-premium">
        <div class="header-premium-content">
            <button class="menu-btn" onclick="history.back()">
                <span class="material-icons">arrow_back</span>
            </button>
            <div class="logo-premium">🎬 Mi Cine</div>
            <div></div>
        </div>
    </header>

    <main class="main-premium">
        <!-- ===== TABS ===== -->
        <div class="lista-tabs">
            <button class="lista-tab active" data-tab="favorites">❤️ Favoritos</button>
            <button class="lista-tab" data-tab="continue">▶️ Continuar viendo</button>
            <button class="lista-tab" data-tab="history">📜 Historial</button>
            <button class="lista-tab" data-tab="pending">⏳ Pendientes</button>
        </div>

        <!-- ===== CONTENIDO ===== -->
        <div class="lista-content">
            <div class="lista-section active" id="section-favorites">
                <div class="section-header-premium">
                    <h2 class="section-title-premium">❤️ Favoritos</h2>
                </div>
                <div class="content-grid" id="favoritesGrid"></div>
            </div>

            <div class="lista-section" id="section-continue">
                <div class="section-header-premium">
                    <h2 class="section-title-premium">▶️ Continuar viendo</h2>
                </div>
                <div class="content-grid" id="continueGrid"></div>
            </div>

            <div class="lista-section" id="section-history">
                <div class="section-header-premium">
                    <h2 class="section-title-premium">📜 Historial</h2>
                </div>
                <div class="history-list" id="historyList"></div>
            </div>

            <div class="lista-section" id="section-pending">
                <div class="section-header-premium">
                    <h2 class="section-title-premium">⏳ Pendientes</h2>
                </div>
                <div class="content-grid" id="pendingGrid"></div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <span class="material-icons">home</span>
            <span>Inicio</span>
        </a>
        <a href="peliculas.html" class="bottom-nav-item">
            <span class="material-icons">movie</span>
            <span>Películas</span>
        </a>
        <a href="series.html" class="bottom-nav-item">
            <span class="material-icons">tv</span>
            <span>Series</span>
        </a>
        <a href="mi-lista.html" class="bottom-nav-item active">
            <span class="material-icons">bookmark</span>
            <span>Mi Lista</span>
        </a>
        <a href="perfil.html" class="bottom-nav-item">
            <span class="material-icons">person</span>
            <span>Perfil</span>
        </a>
    </nav>

    <div class="modal-premium" id="contentModal">
        <div class="modal-premium-content">
            <button class="modal-close-premium" onclick="closeContentModal()">
                <span class="material-icons">close</span>
            </button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/tmdb-api.js"></script>
    <script src="js/database.js"></script>
    
    <script>
        let userFavorites = [];
        let userProgress = {};
        let watchHistory = [];
        let allContent = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const user = auth.currentUser;
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            await loadAllData();
            renderAllSections();
            setupTabs();
        });

        async function loadAllData() {
            const user = auth.currentUser;
            
            // Cargar favoritos
            const favSnapshot = await database.ref(`favorites/${user.uid}`).once('value');
            const favData = favSnapshot.val() || {};
            userFavorites = Object.keys(favData);

            // Cargar progreso
            const progSnapshot = await database.ref(`progress/${user.uid}`).once('value');
            userProgress = progSnapshot.val() || {};

            // Cargar historial
            const histSnapshot = await database.ref(`history/${user.uid}`).once('value');
            const histData = histSnapshot.val() || {};
            watchHistory = Object.values(histData).sort((a, b) => b.timestamp - a.timestamp);

            // Cargar contenido (películas y series)
            const movies = await getAllMovies();
            const series = await getAllSeries();
            allContent = [
                ...movies.map(m => ({ ...m, type: 'movie' })),
                ...series.map(s => ({ ...s, type: 'tv' }))
            ];
        }

        function renderAllSections() {
            renderFavorites();
            renderContinueWatching();
            renderHistory();
            renderPending();
        }

        function renderFavorites() {
            const container = document.getElementById('favoritesGrid');
            const items = allContent.filter(item => userFavorites.includes(String(item.id)));
            
            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state-premium">
                        <span class="empty-icon">❤️</span>
                        <h3>Sin favoritos</h3>
                        <p>Agrega contenido a tu lista de favoritos</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = items.map(item => {
                const isMovie = item.type === 'movie';
                const title = item.title || item.name;
                const year = item.release_date || item.first_air_date || '';
                return `
                    <div class="content-card" onclick="openContentModal(${item.id}, '${isMovie ? 'movie' : 'tv'}')">
                        <div class="card-image">
                            <img src="${getPosterUrl(item.poster_path)}" alt="${title}" loading="lazy">
                            <div class="card-overlay">
                                <button class="play-btn-small">
                                    <span class="material-icons">play_arrow</span>
                                </button>
                            </div>
                        </div>
                        <div class="card-info">
                            <h4>${title}</h4>
                            <span class="card-year">${year ? year.substring(0, 4) : 'N/A'}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderContinueWatching() {
            const container = document.getElementById('continueGrid');
            const items = allContent.filter(item => {
                const progress = userProgress[item.id];
                return progress && progress.episode > 0 && progress.episode < progress.total;
            });

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state-premium">
                        <span class="empty-icon">▶️</span>
                        <h3>Sin contenido en progreso</h3>
                        <p>Empieza a ver algo y aparecerá aquí</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = items.map(item => {
                const progress = userProgress[item.id];
                const percent = progress.total > 0 ? (progress.episode / progress.total) * 100 : 0;
                const isMovie = item.type === 'movie';
                const title = item.title || item.name;
                return `
                    <div class="content-card" onclick="openContentModal(${item.id}, '${isMovie ? 'movie' : 'tv'}')">
                        <div class="card-image">
                            <img src="${getPosterUrl(item.poster_path)}" alt="${title}" loading="lazy">
                            <div class="card-progress-bar" style="width: ${percent}%"></div>
                            <div class="card-overlay">
                                <button class="play-btn-small">
                                    <span class="material-icons">play_arrow</span>
                                </button>
                            </div>
                        </div>
                        <div class="card-info">
                            <h4>${title}</h4>
                            <span class="card-progress-text">${progress.episode}/${progress.total} capítulos</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            
            if (watchHistory.length === 0) {
                container.innerHTML = `
                    <div class="empty-state-premium">
                        <span class="empty-icon">📜</span>
                        <h3>Sin historial</h3>
                        <p>Los contenido que veas aparecerán aquí</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = watchHistory.slice(0, 20).map(entry => {
                const item = allContent.find(c => String(c.id) === String(entry.id));
                if (!item) return '';
                const isMovie = item.type === 'movie';
                const title = item.title || item.name;
                const date = new Date(entry.timestamp);
                const timeAgo = getTimeAgo(date);
                
                return `
                    <div class="history-item" onclick="openContentModal(${item.id}, '${isMovie ? 'movie' : 'tv'}')">
                        <img src="${getPosterUrl(item.poster_path)}" alt="${title}" loading="lazy">
                        <div class="history-info">
                            <h4>${title}</h4>
                            <span class="history-type">${isMovie ? '🎬 Película' : '📺 Serie'}</span>
                            <span class="history-time">${timeAgo}</span>
                        </div>
                        <span class="material-icons">chevron_right</span>
                    </div>
                `;
            }).join('');
        }

        function renderPending() {
            const container = document.getElementById('pendingGrid');
            // Mostrar contenido recomendado como pendiente
            const pending = allContent.slice(0, 8);
            
            container.innerHTML = pending.map(item => {
                const isMovie = item.type === 'movie';
                const title = item.title || item.name;
                const year = item.release_date || item.first_air_date || '';
                return `
                    <div class="content-card" onclick="openContentModal(${item.id}, '${isMovie ? 'movie' : 'tv'}')">
                        <div class="card-image">
                            <img src="${getPosterUrl(item.poster_path)}" alt="${title}" loading="lazy">
                            <div class="card-badge pending">⏳ Pendiente</div>
                            <div class="card-overlay">
                                <button class="play-btn-small">
                                    <span class="material-icons">play_arrow</span>
                                </button>
                            </div>
                        </div>
                        <div class="card-info">
                            <h4>${title}</h4>
                            <span class="card-year">${year ? year.substring(0, 4) : 'N/A'}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getTimeAgo(date) {
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            
            if (diff < 60) return 'Hace unos segundos';
            if (diff < 3600) return `Hace ${Math.floor(diff / 60)} minutos`;
            if (diff < 86400) return `Hace ${Math.floor(diff / 3600)} horas`;
            if (diff < 604800) return `Hace ${Math.floor(diff / 86400)} días`;
            return date.toLocaleDateString();
        }

        function setupTabs() {
            document.querySelectorAll('.lista-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.lista-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.lista-section').forEach(s => s.classList.remove('active'));
                    
                    this.classList.add('active');
                    document.getElementById('section-' + this.dataset.tab).classList.add('active');
                });
            });
        }

        // ==================== FUNCIONES DE UTILIDAD ====================
        function getPosterUrl(path) {
            return path ? `https://image.tmdb.org/t/p/w500${path}` : 'https://via.placeholder.com/300x450/1A1A1A/ffffff?text=No+Image';
        }

        async function getDetails(id, type) {
            try {
                const url = type === 'movie'
                    ? `${TMDB_BASE_URL}/movie/${id}?api_key=${TMDB_API_KEY}&language=es-ES`
                    : `${TMDB_BASE_URL}/tv/${id}?api_key=${TMDB_API_KEY}&language=es-ES`;
                const response = await fetch(url);
                return await response.json();
            } catch (error) {
                console.error('Error:', error);
                return null;
            }
        }

        async function openContentModal(id, type) {
            const modal = document.getElementById('contentModal');
            const modalContent = document.getElementById('modalContent');
            
            modalContent.innerHTML = `
                <div class="modal-loading">
                    <div class="loader-dot"></div>
                    <div class="loader-dot"></div>
                    <div class="loader-dot"></div>
                </div>
            `;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';

            try {
                const data = await getDetails(id, type);
                if (!data) throw new Error('No se encontraron detalles');

                const isMovie = type === 'movie';
                const title = data.title || data.name;
                const poster = getPosterUrl(data.poster_path);
                const backdrop = data.backdrop_path ? `https://image.tmdb.org/t/p/original${data.backdrop_path}` : poster;
                const overview = data.overview || 'Sin descripción disponible';
                const voteAverage = data.vote_average ? data.vote_average.toFixed(1) : 'N/A';

                modalContent.innerHTML = `
                    <div class="modal-hero" style="background-image: url(${backdrop})">
                        <div class="modal-hero-gradient"></div>
                        <div class="modal-hero-content">
                            <img src="${poster}" alt="${title}" class="modal-poster-img">
                            <div class="modal-hero-info">
                                <h2>${title}</h2>
                                <div class="modal-meta">
                                    <span class="modal-rating">⭐ ${voteAverage}</span>
                                </div>
                                <div class="modal-actions">
                                    <button class="modal-play-btn" onclick="window.location.href='reproductor.html?id=${id}&type=${type}'">
                                        <span class="material-icons">play_arrow</span> Reproducir
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-body">
                        <div class="modal-description">
                            <h3>Sinopsis</h3>
                            <p>${overview}</p>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error('Error:', error);
                modalContent.innerHTML = `
                    <div class="modal-error">
                        <span class="error-icon">❌</span>
                        <p>Error al cargar los detalles</p>
                    </div>
                `;
            }
        }

        function closeContentModal() {
            document.getElementById('contentModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeContentModal();
        });

        document.getElementById('contentModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeContentModal();
        });

        console.log('✅ Mi Lista cargada correctamente');
    </script>
</body>
</html>
