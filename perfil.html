<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Cine - Perfil</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <header class="header-premium">
        <div class="header-premium-content">
            <button class="menu-btn" onclick="history.back()">
                <span class="material-icons">arrow_back</span>
            </button>
            <div class="logo-premium">🎬 Mi Cine</div>
            <div></div>
        </div>
    </header>

    <main class="main-premium">
        <div class="profile-page">
            <!-- ===== HEADER PERFIL ===== -->
            <div class="profile-header-page">
                <div class="profile-avatar-large" onclick="changeProfilePhoto()">
                    <img id="profileAvatar" src="" alt="Avatar">
                    <div class="avatar-edit">
                        <span class="material-icons">camera_alt</span>
                    </div>
                </div>
                <h2 id="profileName">Usuario</h2>
                <p class="profile-email" id="profileEmail">email@ejemplo.com</p>
                <div class="profile-badges">
                    <span class="profile-badge premium">⭐ Miembro Premium</span>
                    <span class="profile-badge since" id="profileSince">Desde 2024</span>
                </div>
            </div>

            <!-- ===== ESTADÍSTICAS ===== -->
            <div class="profile-stats">
                <div class="stat-item" onclick="goToSection('favorites')">
                    <span class="stat-number" id="statFavorites">0</span>
                    <span class="stat-label">❤️ Favoritos</span>
                </div>
                <div class="stat-item" onclick="goToSection('continue')">
                    <span class="stat-number" id="statWatching">0</span>
                    <span class="stat-label">▶️ Viendo</span>
                </div>
                <div class="stat-item" onclick="goToSection('history')">
                    <span class="stat-number" id="statCompleted">0</span>
                    <span class="stat-label">✅ Completadas</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="statTime">0h</span>
                    <span class="stat-label">⏱️ Tiempo</span>
                </div>
            </div>

            <!-- ===== MENÚ ===== -->
            <div class="profile-menu-list">
                <div class="profile-menu-group">
                    <h4>Mi cuenta</h4>
                    <button class="profile-menu-item" onclick="editProfile()">
                        <span class="material-icons">edit</span>
                        <span>Editar perfil</span>
                        <span class="material-icons">chevron_right</span>
                    </button>
                    <button class="profile-menu-item" onclick="changePassword()">
                        <span class="material-icons">lock</span>
                        <span>Cambiar contraseña</span>
                        <span class="material-icons">chevron_right</span>
                    </button>
                    <button class="profile-menu-item" onclick="changePhoto()">
                        <span class="material-icons">photo_camera</span>
                        <span>Cambiar foto</span>
                        <span class="material-icons">chevron_right</span>
                    </button>
                </div>

                <div class="profile-menu-group">
                    <h4>Contenido</h4>
                    <button class="profile-menu-item" onclick="goToSection('favorites')">
                        <span class="material-icons">favorite</span>
                        <span>Favoritos</span>
                        <span class="material-icons">chevron_right</span>
                    </button>
                    <button class="profile-menu-item" onclick="goToSection('continue')">
                        <span class="material-icons">play_circle</span>
                        <span>Continuar viendo</span>
                        <span class="material-icons">chevron_right</span>
                    </button>
                    <button class="profile-menu-item" onclick="goToSection('history')">
                        <span class="material-icons">history</span>
                        <span>Historial</span>
                        <span class="material-icons">chevron_right</span>
                    </button>
                    <button class="profile-menu-item" onclick="goToSection('pending')">
                        <span class="material-icons">schedule</span>
                        <span>Pendientes</span>
                        <span class="material-icons">chevron_right</span>
                    </button>
                </div>

                <div class="profile-menu-group">
                    <h4>Configuración</h4>
                    <button class="profile-menu-item" onclick="openSettings()">
                        <span class="material-icons">settings</span>
                        <span>Configuración</span>
                        <span class="material-icons">chevron_right</span>
                    </button>
                    <button class="profile-menu-item" onclick="openHelp()">
                        <span class="material-icons">help</span>
                        <span>Ayuda</span>
                        <span class="material-icons">chevron_right</span>
                    </button>
                    <button class="profile-menu-item" onclick="openAbout()">
                        <span class="material-icons">info</span>
                        <span>Acerca de</span>
                        <span class="material-icons">chevron_right</span>
                    </button>
                </div>

                <button class="profile-menu-item danger" id="profileLogout">
                    <span class="material-icons">logout</span>
                    <span>Cerrar Sesión</span>
                    <span class="material-icons">chevron_right</span>
                </button>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <span class="material-icons">home</span>
            <span>Inicio</span>
        </a>
        <a href="peliculas.html" class="bottom-nav-item">
            <span class="material-icons">movie</span>
            <span>Películas</span>
        </a>
        <a href="series.html" class="bottom-nav-item">
            <span class="material-icons">tv</span>
            <span>Series</span>
        </a>
        <a href="mi-lista.html" class="bottom-nav-item">
            <span class="material-icons">bookmark</span>
            <span>Mi Lista</span>
        </a>
        <a href="perfil.html" class="bottom-nav-item active">
            <span class="material-icons">person</span>
            <span>Perfil</span>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        let userStats = {
            favorites: 0,
            watching: 0,
            completed: 0,
            totalTime: 0
        };

        document.addEventListener('DOMContentLoaded', () => {
            const user = auth.currentUser;
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            loadUserProfile(user);
            loadUserStats(user);
            
            document.getElementById('profileLogout').addEventListener('click', () => {
                if (confirm('¿Seguro que quieres cerrar sesión?')) {
                    auth.signOut().then(() => {
                        window.location.href = 'login.html';
                    });
                }
            });
        });

        function loadUserProfile(user) {
            document.getElementById('profileAvatar').src = user.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.displayName || 'Usuario') + '&background=E50914&color=fff&size=200';
            document.getElementById('profileName').textContent = user.displayName || 'Usuario';
            document.getElementById('profileEmail').textContent = user.email || 'email@ejemplo.com';
            
            // Fecha de registro (simulada)
            const creationDate = user.metadata?.creationTime ? new Date(user.metadata.creationTime) : new Date();
            document.getElementById('profileSince').textContent = `Desde ${creationDate.getFullYear()}`;
        }

        function loadUserStats(user) {
            // Cargar favoritos
            database.ref(`favorites/${user.uid}`).on('value', (snapshot) => {
                const data = snapshot.val() || {};
                userStats.favorites = Object.keys(data).length;
                document.getElementById('statFavorites').textContent = userStats.favorites;
            });

            // Cargar progreso
            database.ref(`progress/${user.uid}`).on('value', (snapshot) => {
                const data = snapshot.val() || {};
                let watching = 0;
                let completed = 0;
                let totalTime = 0;
                
                Object.values(data).forEach(progress => {
                    if (progress.episode > 0 && progress.episode < progress.total) {
                        watching++;
                    } else if (progress.episode === progress.total && progress.total > 0) {
                        completed++;
                    }
                    // Estimar tiempo (30min por episodio)
                    totalTime += progress.episode * 30;
                });
                
                userStats.watching = watching;
                userStats.completed = completed;
                userStats.totalTime = totalTime;
                
                document.getElementById('statWatching').textContent = watching;
                document.getElementById('statCompleted').textContent = completed;
                document.getElementById('statTime').textContent = formatTime(totalTime);
            });
        }

        function formatTime(minutes) {
            if (minutes < 60) return `${minutes}m`;
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            return `${hours}h ${mins}m`;
        }

        function goToSection(section) {
            window.location.href = `mi-lista.html?tab=${section}`;
        }

        function editProfile() {
            const name = prompt('Nuevo nombre:', document.getElementById('profileName').textContent);
            if (name && name.trim()) {
                const user = auth.currentUser;
                user.updateProfile({ displayName: name.trim() })
                    .then(() => {
                        document.getElementById('profileName').textContent = name.trim();
                        alert('✅ Perfil actualizado');
                    })
                    .catch(error => alert('❌ Error: ' + error.message));
            }
        }

        function changePassword() {
            const user = auth.currentUser;
            const email = user.email;
            
            if (confirm(`Se enviará un enlace de restablecimiento a ${email}`)) {
                auth.sendPasswordResetEmail(email)
                    .then(() => alert('✅ Enlace enviado a tu correo'))
                    .catch(error => alert('❌ Error: ' + error.message));
            }
        }

        function changePhoto() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const imgData = event.target.result;
                        document.getElementById('profileAvatar').src = imgData;
                        // Aquí se podría subir a Firebase Storage
                        alert('✅ Foto actualizada (guardada localmente)');
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function openSettings() {
            alert('⚙️ Configuración en desarrollo');
        }

        function openHelp() {
            alert('❓ Ayuda en desarrollo');
        }

        function openAbout() {
            alert('🎬 Mi Cine v1.0\n\nTu plataforma de entretenimiento favorita');
        }

        console.log('✅ Perfil cargado correctamente');
    </script>
</body>
</html>
