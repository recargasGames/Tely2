<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Cine - Series</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <header class="header-premium">
        <div class="header-premium-content">
            <button class="menu-btn" id="menuToggle">
                <span class="material-icons">menu</span>
            </button>
            <div class="logo-premium">🎬 Mi Cine</div>
            <div class="header-actions">
                <button class="search-btn" id="searchToggle">
                    <span class="material-icons">search</span>
                </button>
            </div>
        </div>
        <div class="search-expand" id="searchExpand">
            <div class="search-input-wrapper">
                <span class="material-icons">search</span>
                <input type="text" id="searchSeries" placeholder="Buscar series...">
                <button class="clear-search" id="clearSearch">
                    <span class="material-icons">close</span>
                </button>
            </div>
        </div>
    </header>

    <!-- MENÚ LATERAL -->
    <div class="side-menu" id="sideMenu">
        <div class="side-menu-header">
            <div class="logo-premium">🎬 Mi Cine</div>
            <button class="close-menu" id="closeMenu">
                <span class="material-icons">close</span>
            </button>
        </div>
        <div class="side-user-info">
            <img id="sideUserAvatar" src="" alt="Avatar">
            <div>
                <h4 id="sideUserName">Usuario</h4>
                <span class="side-user-badge">Premium</span>
            </div>
        </div>
        <nav class="side-nav">
            <a href="index.html" class="side-nav-item">🏠 Inicio</a>
            <a href="peliculas.html" class="side-nav-item">🎬 Películas</a>
            <a href="series.html" class="side-nav-item active">📺 Series</a>
            <a href="mi-lista.html" class="side-nav-item">🔖 Mi Lista</a>
            <a href="perfil.html" class="side-nav-item">👤 Perfil</a>
        </nav>
        <div class="side-menu-footer">
            <button class="btn-logout-side" id="logoutSide">Cerrar Sesión</button>
        </div>
    </div>
    <div class="menu-overlay" id="menuOverlay"></div>

    <main class="main-premium">
        <div class="section-header-premium">
            <h2 class="section-title-premium">
                <span class="material-icons">tv</span> Todas las Series
            </h2>
        </div>
        <div id="seriesGrid" class="content-grid"></div>
    </main>

    <!-- BARRA INFERIOR -->
    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <span class="material-icons">home</span>
            <span>Inicio</span>
        </a>
        <a href="peliculas.html" class="bottom-nav-item">
            <span class="material-icons">movie</span>
            <span>Películas</span>
        </a>
        <a href="series.html" class="bottom-nav-item active">
            <span class="material-icons">tv</span>
            <span>Series</span>
        </a>
        <a href="mi-lista.html" class="bottom-nav-item">
            <span class="material-icons">bookmark</span>
            <span>Mi Lista</span>
        </a>
        <a href="perfil.html" class="bottom-nav-item">
            <span class="material-icons">person</span>
            <span>Perfil</span>
        </a>
    </nav>

    <!-- MODAL -->
    <div id="contentModal" class="modal-premium">
        <div class="modal-premium-content">
            <button class="modal-close-premium" onclick="closeContentModal()">
                <span class="material-icons">close</span>
            </button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/tmdb-api.js"></script>
    <script src="js/database.js"></script>
    
    <script>
        // ==================== VARIABLES ====================
        let allSeries = [];
        let currentPage = 1;
        let isLoading = false;
        let hasMore = true;

        // ==================== CARGAR SERIES ====================
        async function loadSeries(page = 1, append = false) {
            if (isLoading) return;
            if (!append) {
                currentPage = 1;
                hasMore = true;
                document.getElementById('seriesGrid').innerHTML = `
                    <div class="skeleton-grid">
                        ${Array(6).fill(0).map(() => `
                            <div class="skeleton-card">
                                <div class="skeleton-image"></div>
                                <div class="skeleton-title"></div>
                                <div class="skeleton-meta"></div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            isLoading = true;

            try {
                const response = await fetch(
                    `${TMDB_BASE_URL}/tv/popular?api_key=${TMDB_API_KEY}&language=es-ES&page=${page}`
                );
                const data = await response.json();
                const series = data.results || [];

                if (series.length === 0) {
                    hasMore = false;
                    isLoading = false;
                    return;
                }

                if (!append) {
                    allSeries = series;
                } else {
                    allSeries = [...allSeries, ...series];
                }

                renderSeries(allSeries, append);
                isLoading = false;
                hasMore = series.length === 20;

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('seriesGrid').innerHTML = `
                    <div class="empty-state-premium" style="grid-column:1/-1;">
                        <div class="empty-icon">❌</div>
                        <h3>Error al cargar series</h3>
                        <p>${error.message}</p>
                        <button class="btn btn-primary" onclick="loadSeries(1)">Reintentar</button>
                    </div>
                `;
                isLoading = false;
            }
        }

        // ==================== RENDERIZAR SERIES ====================
        function renderSeries(series, append = false) {
            const grid = document.getElementById('seriesGrid');

            if (series.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state-premium" style="grid-column:1/-1;">
                        <div class="empty-icon">📺</div>
                        <h3>No hay series disponibles</h3>
                        <p>Pronto agregaremos más contenido</p>
                    </div>
                `;
                return;
            }

            const cards = series.map(serie => `
                <div class="content-card" onclick="openContentModal(${serie.id}, 'tv')">
                    <div class="card-image">
                        <img src="${getPosterUrl(serie.poster_path)}" alt="${serie.name}" loading="lazy">
                        <div class="card-badge top">${serie.vote_average ? '⭐ ' + serie.vote_average.toFixed(1) : 'Nuevo'}</div>
                        <div class="card-overlay">
                            <button class="play-btn-small">
                                <span class="material-icons">play_arrow</span>
                            </button>
                        </div>
                    </div>
                    <div class="card-info">
                        <h4>${serie.name}</h4>
                        <span class="card-year">${serie.first_air_date ? serie.first_air_date.substring(0, 4) : 'N/A'}</span>
                    </div>
                </div>
            `).join('');

            if (append) {
                grid.innerHTML += cards;
            } else {
                grid.innerHTML = cards;
            }

            const existingBtn = document.querySelector('.load-more-btn');
            if (existingBtn) existingBtn.remove();

            if (hasMore && series.length > 0) {
                const btn = document.createElement('button');
                btn.className = 'btn btn-secondary load-more-btn';
                btn.textContent = '📥 Cargar más series';
                btn.style.cssText = 'margin: 20px auto; display: block; padding: 12px 32px;';
                btn.onclick = () => {
                    currentPage++;
                    loadSeries(currentPage, true);
                };
                grid.parentElement.appendChild(btn);
            }
        }

        // ==================== FUNCIONES GLOBALES ====================
        function getPosterUrl(path) {
            return path ? `https://image.tmdb.org/t/p/w500${path}` : 'https://via.placeholder.com/300x450/1A1A1A/ffffff?text=No+Image';
        }

        async function getSeriesDetails(id) {
            try {
                const response = await fetch(
                    `${TMDB_BASE_URL}/tv/${id}?api_key=${TMDB_API_KEY}&language=es-ES`
                );
                return await response.json();
            } catch (error) {
                console.error('Error:', error);
                return null;
            }
        }

        async function openContentModal(id, type) {
            const user = auth.currentUser;
            if (!user) {
                if (confirm('🔒 Para ver detalles necesitas iniciar sesión. ¿Deseas ir al login?')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            const modal = document.getElementById('contentModal');
            const modalContent = document.getElementById('modalContent');

            modalContent.innerHTML = `
                <div class="modal-loading">
                    <div class="loader-dot"></div>
                    <div class="loader-dot"></div>
                    <div class="loader-dot"></div>
                </div>
            `;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';

            try {
                const data = await getSeriesDetails(id);
                if (!data) throw new Error('No se encontraron detalles');

                const poster = getPosterUrl(data.poster_path);
                const backdrop = data.backdrop_path ? `https://image.tmdb.org/t/p/original${data.backdrop_path}` : poster;

                // Generar enlace para primer episodio
                const firstSeason = data.seasons?.find(s => s.season_number > 0);
                const seasonNum = firstSeason?.season_number || 1;
                const videoUrl = `https://unlimplay.co/play/tv/${id}/${seasonNum}/1`;

                // Episodios
                let episodesHTML = '';
                if (firstSeason) {
                    const epCount = Math.min(firstSeason.episode_count || 10, 10);
                    episodesHTML = `
                        <div class="modal-seasons">
                            <h3>Temporada ${seasonNum}</h3>
                            <div class="modal-episodes">
                                ${Array.from({length: epCount}, (_, i) => `
                                    <a href="https://unlimplay.co/play/tv/${id}/${seasonNum}/${i+1}" target="_blank" class="modal-episode-btn">
                                        Episodio ${i+1}
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                modalContent.innerHTML = `
                    <div class="modal-hero" style="background-image: url(${backdrop})">
                        <div class="modal-hero-gradient"></div>
                        <div class="modal-hero-content">
                            <img src="${poster}" alt="${data.name}" class="modal-poster-img">
                            <div class="modal-hero-info">
                                <h2>${data.name}</h2>
                                <div class="modal-meta">
                                    <span class="modal-year">${data.first_air_date ? data.first_air_date.substring(0, 4) : 'N/A'}</span>
                                    <span class="modal-rating">⭐ ${data.vote_average ? data.vote_average.toFixed(1) : 'N/A'}</span>
                                    <span class="modal-seasons-count">${data.seasons?.filter(s => s.season_number > 0).length || 0} temporadas</span>
                                </div>
                                <div class="modal-genres">
                                    ${data.genres?.map(g => `<span class="genre-tag">${g.name}</span>`).join('') || 'Sin géneros'}
                                </div>
                                <div class="modal-actions">
                                    <a href="${videoUrl}" target="_blank" class="modal-play-btn">
                                        <span class="material-icons">play_arrow</span> Reproducir
                                    </a>
                                    <button class="modal-fav-btn" onclick="toggleFavorite(${id})">
                                        <span class="material-icons">favorite_border</span>
                                    </button>
                                    <button class="modal-share-btn" onclick="shareContent('${data.name}')">
                                        <span class="material-icons">share</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-body">
                        <div class="modal-description">
                            <h3>Sinopsis</h3>
                            <p>${data.overview || 'Sin descripción disponible'}</p>
                        </div>
                        ${episodesHTML}
                    </div>
                `;

            } catch (error) {
                console.error('Error:', error);
                modalContent.innerHTML = `
                    <div class="modal-error">
                        <span class="error-icon">❌</span>
                        <p>Error al cargar los detalles</p>
                        <button class="btn btn-primary" onclick="openContentModal(${id}, '${type}')">Reintentar</button>
                    </div>
                `;
            }
        }

        function closeContentModal() {
            document.getElementById('contentModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function shareContent(title) {
            if (navigator.share) {
                navigator.share({
                    title: `Mi Cine - ${title}`,
                    text: `Mira "${title}" en Mi Cine`,
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Enlace copiado al portapapeles');
            }
        }

        // ==================== EVENTOS ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadSeries(1);

            // Búsqueda
            const searchInput = document.getElementById('searchSeries');
            let searchTimeout;

            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                const query = this.value.trim();

                if (query === '') {
                    loadSeries(1);
                    return;
                }

                searchTimeout = setTimeout(async () => {
                    try {
                        const response = await fetch(
                            `${TMDB_BASE_URL}/search/tv?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=es-ES`
                        );
                        const data = await response.json();
                        const results = data.results || [];
                        renderSeries(results);
                        const btn = document.querySelector('.load-more-btn');
                        if (btn) btn.remove();
                    } catch (error) {
                        console.error('Error:', error);
                    }
                }, 500);
            });

            document.getElementById('clearSearch').addEventListener('click', () => {
                searchInput.value = '';
                loadSeries(1);
            });

            // Menú lateral
            document.getElementById('menuToggle').addEventListener('click', () => {
                document.getElementById('sideMenu').classList.add('active');
                document.getElementById('menuOverlay').classList.add('active');
            });

            document.getElementById('closeMenu').addEventListener('click', closeMenu);
            document.getElementById('menuOverlay').addEventListener('click', closeMenu);

            function closeMenu() {
                document.getElementById('sideMenu').classList.remove('active');
                document.getElementById('menuOverlay').classList.remove('active');
            }

            // Búsqueda toggle
            document.getElementById('searchToggle').addEventListener('click', () => {
                document.getElementById('searchExpand').classList.toggle('active');
                if (document.getElementById('searchExpand').classList.contains('active')) {
                    searchInput.focus();
                }
            });

            // Cerrar modal
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeContentModal();
                    closeMenu();
                }
            });

            document.getElementById('contentModal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeContentModal();
            });
        });

        console.log('✅ Series cargadas correctamente');
    </script>
</body>
</html>
