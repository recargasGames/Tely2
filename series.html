<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Cine - Series</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <header class="header-premium">
        <div class="header-premium-content">
            <button class="menu-btn" id="menuToggle">
                <span class="material-icons">menu</span>
            </button>
            <div class="logo-premium">🎬 Mi Cine</div>
            <div class="header-actions">
                <button class="search-btn" id="searchToggle">
                    <span class="material-icons">search</span>
                </button>
            </div>
        </div>
        <div class="search-expand" id="searchExpand">
            <div class="search-input-wrapper">
                <span class="material-icons">search</span>
                <input type="text" id="searchSeries" placeholder="Buscar series...">
            </div>
        </div>
    </header>

    <!-- MENÚ LATERAL -->
    <div class="side-menu" id="sideMenu">
        <div class="side-menu-header">
            <div class="logo-premium">🎬 Mi Cine</div>
            <button class="close-menu" id="closeMenu">
                <span class="material-icons">close</span>
            </button>
        </div>
        <div class="side-user-info">
            <img id="sideUserAvatar" src="" alt="Avatar">
            <div>
                <h4 id="sideUserName">Usuario</h4>
                <span class="side-user-badge">Premium</span>
            </div>
        </div>
        <nav class="side-nav">
            <a href="index.html" class="side-nav-item">🏠 Inicio</a>
            <a href="peliculas.html" class="side-nav-item">🎬 Películas</a>
            <a href="series.html" class="side-nav-item active">📺 Series</a>
            <a href="mi-lista.html" class="side-nav-item">🔖 Mi Lista</a>
            <a href="perfil.html" class="side-nav-item">👤 Perfil</a>
        </nav>
        <div class="side-menu-footer">
            <button class="btn-logout-side" id="logoutSide">Cerrar Sesión</button>
        </div>
    </div>
    <div class="menu-overlay" id="menuOverlay"></div>

    <main class="main-premium">
        <div class="section-header-premium">
            <h2 class="section-title-premium">
                <span class="material-icons">tv</span> Todas las Series
            </h2>
        </div>
        <div id="seriesGrid" class="content-grid"></div>
    </main>

    <!-- BARRA INFERIOR -->
    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <span class="material-icons">home</span>
            <span>Inicio</span>
        </a>
        <a href="peliculas.html" class="bottom-nav-item">
            <span class="material-icons">movie</span>
            <span>Películas</span>
        </a>
        <a href="series.html" class="bottom-nav-item active">
            <span class="material-icons">tv</span>
            <span>Series</span>
        </a>
        <a href="mi-lista.html" class="bottom-nav-item">
            <span class="material-icons">bookmark</span>
            <span>Mi Lista</span>
        </a>
        <a href="perfil.html" class="bottom-nav-item">
            <span class="material-icons">person</span>
            <span>Perfil</span>
        </a>
    </nav>

    <!-- MODAL -->
    <div id="contentModal" class="modal-premium">
        <div class="modal-premium-content">
            <button class="modal-close-premium" onclick="closeContentModal()">
                <span class="material-icons">close</span>
            </button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // ==================== CARGAR SERIES DESDE FIREBASE ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadSeries();
            setupEventListeners();
        });

        function loadSeries() {
            const grid = document.getElementById('seriesGrid');
            
            grid.innerHTML = `
                <div class="skeleton-grid">
                    ${Array(6).fill(0).map(() => `
                        <div class="skeleton-card">
                            <div class="skeleton-image"></div>
                            <div class="skeleton-title"></div>
                            <div class="skeleton-meta"></div>
                        </div>
                    `).join('')}
                </div>
            `;

            database.ref('content').orderByChild('createdAt').on('value', (snapshot) => {
                const data = snapshot.val();
                let series = [];

                if (data) {
                    Object.keys(data).forEach(key => {
                        const item = data[key];
                        if (item.type === 'serie') {
                            series.push({ id: key, ...item });
                        }
                    });
                    series.reverse();
                }

                if (series.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state-premium" style="grid-column:1/-1;">
                            <div class="empty-icon">📺</div>
                            <h3>No hay series</h3>
                            <p>Ve al panel de administración y presiona "AGREGAR TODAS LAS SERIES"</p>
                            <a href="admin.html" class="btn btn-primary" style="margin-top:12px;">Ir al Admin</a>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = series.map(serie => `
                    <div class="content-card" onclick="openContentModal('${serie.id}')">
                        <div class="card-image">
                            <img src="${serie.poster}" alt="${serie.title}" loading="lazy">
                            <div class="card-badge top">${serie.vote_average ? '⭐ ' + serie.vote_average.toFixed(1) : 'Nuevo'}</div>
                            <div class="card-overlay">
                                <button class="play-btn-small">
                                    <span class="material-icons">play_arrow</span>
                                </button>
                            </div>
                        </div>
                        <div class="card-info">
                            <h4>${serie.title}</h4>
                            <span class="card-year">${serie.year || 'N/A'}</span>
                        </div>
                    </div>
                `).join('');
            });
        }

        // ==================== ABRIR MODAL ====================
        async function openContentModal(id) {
            const user = auth.currentUser;
            if (!user) {
                if (confirm('🔒 Para ver detalles necesitas iniciar sesión. ¿Deseas ir al login?')) {
                    window.location.href = 'login.html';
                }
                return;
            }

            const modal = document.getElementById('contentModal');
            const modalContent = document.getElementById('modalContent');

            modalContent.innerHTML = `
                <div class="modal-loading">
                    <div class="loader-dot"></div>
                    <div class="loader-dot"></div>
                    <div class="loader-dot"></div>
                </div>
            `;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';

            try {
                const snapshot = await database.ref(`content/${id}`).once('value');
                const data = snapshot.val();

                if (!data) {
                    throw new Error('No se encontró el contenido');
                }

                const poster = data.poster;
                const videoUrl = data.videoUrl || `https://unlimplay.co/play/tv/${data.tmdbId}/1/1`;

                // Generar episodios
                let episodesHTML = '';
                if (data.episodes && data.episodes.length > 0) {
                    episodesHTML = `
                        <div class="modal-seasons">
                            <h3>Episodios</h3>
                            <div class="modal-episodes">
                                ${data.episodes.slice(0, 20).map(ep => `
                                    <a href="${ep.url}" target="_blank" class="modal-episode-btn">
                                        ${ep.title}
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                modalContent.innerHTML = `
                    <div class="modal-hero" style="background-image: url(${poster})">
                        <div class="modal-hero-gradient"></div>
                        <div class="modal-hero-content">
                            <img src="${poster}" alt="${data.title}" class="modal-poster-img">
                            <div class="modal-hero-info">
                                <h2>${data.title}</h2>
                                <div class="modal-meta">
                                    <span class="modal-year">${data.year || 'N/A'}</span>
                                    <span class="modal-rating">⭐ ${data.vote_average || 'N/A'}</span>
                                    <span class="modal-seasons-count">${data.episodes?.length || 0} episodios</span>
                                </div>
                                <div class="modal-actions">
                                    <a href="${videoUrl}" target="_blank" class="modal-play-btn">
                                        <span class="material-icons">play_arrow</span> Reproducir
                                    </a>
                                    <button class="modal-fav-btn" onclick="toggleFavorite('${id}')">
                                        <span class="material-icons">favorite_border</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-body">
                        <div class="modal-description">
                            <h3>Sinopsis</h3>
                            <p>${data.description || 'Sin descripción disponible'}</p>
                        </div>
                        ${episodesHTML}
                    </div>
                `;

            } catch (error) {
                console.error('Error:', error);
                modalContent.innerHTML = `
                    <div class="modal-error">
                        <span class="error-icon">❌</span>
                        <p>Error al cargar los detalles</p>
                        <button class="btn btn-primary" onclick="openContentModal('${id}')">Reintentar</button>
                    </div>
                `;
            }
        }

        function closeContentModal() {
            document.getElementById('contentModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // ==================== FAVORITOS ====================
        async function toggleFavorite(id) {
            const user = auth.currentUser;
            if (!user) return;

            const ref = database.ref(`favorites/${user.uid}/${id}`);
            const snapshot = await ref.once('value');
            const exists = snapshot.exists();

            if (exists) {
                await ref.remove();
                alert('❌ Eliminado de favoritos');
            } else {
                await ref.set(true);
                alert('✅ Agregado a favoritos');
            }
        }

        // ==================== EVENTOS ====================
        function setupEventListeners() {
            document.getElementById('menuToggle').addEventListener('click', () => {
                document.getElementById('sideMenu').classList.add('active');
                document.getElementById('menuOverlay').classList.add('active');
            });

            document.getElementById('closeMenu').addEventListener('click', closeMenu);
            document.getElementById('menuOverlay').addEventListener('click', closeMenu);

            function closeMenu() {
                document.getElementById('sideMenu').classList.remove('active');
                document.getElementById('menuOverlay').classList.remove('active');
            }

            document.getElementById('searchToggle').addEventListener('click', () => {
                document.getElementById('searchExpand').classList.toggle('active');
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeContentModal();
            });

            document.getElementById('contentModal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeContentModal();
            });
        }

        console.log('✅ Series cargadas');
    </script>
</body>
</html>
