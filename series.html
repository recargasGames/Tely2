<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cine - Series</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">🎬 Mi Cine</div>
            <nav class="nav-menu">
                <a href="index.html">🏠 Inicio</a>
                <a href="peliculas.html">🎬 Películas</a>
                <a href="series.html" class="active">📺 Series</a>
            </nav>
            <div class="auth-section">
                <div id="userInfo" class="user-info hidden">
                    <img id="userPhoto" src="" alt="User">
                    <span id="userName"></span>
                </div>
                <button id="loginBtn" class="btn btn-google" onclick="window.location.href='login.html'">🔑 Iniciar Sesión</button>
                <button id="logoutBtn" class="btn btn-logout hidden">Cerrar Sesión</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="section">
            <div class="section-header">
                <h2>📺 Todas las Series</h2>
                <div class="search-box small">
                    <input type="text" id="searchSeries" placeholder="🔍 Buscar series...">
                </div>
            </div>
            <div id="seriesGrid" class="content-grid"></div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h3>🎬 Mi Cine</h3>
                <p>Tu plataforma de entretenimiento favorita</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 Mi Cine - Todos los derechos reservados</p>
        </div>
    </footer>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/tmdb-api.js"></script>
    <script src="js/database.js"></script>
    
    <script>
        let currentPage = 1;

        async function loadSeries(page = 1) {
            const container = document.getElementById('seriesGrid');
            
            if (page === 1) {
                container.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Cargando series...</p>
                    </div>
                `;
            }

            try {
                const series = await getPopularSeries(page);
                const items = series.map(m => ({ ...m, media_type: 'tv' }));
                
                if (page === 1) {
                    renderCards('seriesGrid', items);
                    if (series.length > 0) {
                        const parent = container.parentElement;
                        const existingBtn = parent.querySelector('.load-more-btn');
                        if (existingBtn) existingBtn.remove();
                        const btn = document.createElement('button');
                        btn.className = 'btn btn-secondary load-more-btn';
                        btn.textContent = '📥 Cargar más series';
                        btn.style.margin = '30px auto';
                        btn.style.display = 'block';
                        btn.onclick = () => {
                            currentPage++;
                            loadSeries(currentPage);
                        };
                        parent.appendChild(btn);
                    }
                } else {
                    const existingItems = container.querySelectorAll('.movie-card');
                    const newItems = items.map(item => {
                        const title = item.title || item.name;
                        const year = item.release_date || item.first_air_date || '';
                        const poster = getPosterUrl(item.poster_path);
                        const id = item.id;

                        return `
                            <div class="movie-card" onclick="openModalTMDB(${id}, 'tv')">
                                <div class="card-image">
                                    <img src="${poster}" alt="${title}" loading="lazy">
                                    <div class="badge-type">📺</div>
                                    <div class="badge-top">${year ? year.substring(0, 4) : 'N/A'}</div>
                                    <div class="card-overlay">
                                        <div class="play-btn">▶</div>
                                    </div>
                                </div>
                                <div class="movie-info">
                                    <h3>${title}</h3>
                                    <div class="meta">
                                        <span class="year">${year ? year.substring(0, 4) : 'Año desconocido'}</span>
                                        <span class="type-badge badge-serie">Serie</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    container.innerHTML += newItems;
                    
                    if (series.length === 0) {
                        const btn = container.parentElement.querySelector('.load-more-btn');
                        if (btn) btn.remove();
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                if (page === 1) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">❌</div>
                            <p>Error al cargar las series</p>
                        </div>
                    `;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadSeries(1);

            document.getElementById('searchSeries').addEventListener('input', function() {
                const query = this.value.trim();
                const container = document.getElementById('seriesGrid');
                const loadBtn = container.parentElement.querySelector('.load-more-btn');
                if (loadBtn) loadBtn.style.display = 'none';
                
                if (query === '') {
                    currentPage = 1;
                    loadSeries(1);
                    return;
                }
                
                searchContentAndRender('seriesGrid', query, 'serie');
            });
        });
    </script>
</body>
</html>
