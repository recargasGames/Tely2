<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Subir Videos</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* Mismos estilos de antes */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0D0D0D;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: #1A1A1A;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        h1 { font-size: 28px; margin-bottom: 8px; }
        p { color: #888; font-size: 17px; margin-bottom: 20px; }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }
        .form-group label { color: #aaa; font-size: 17px; font-weight: 600; }
        .form-group input, .form-group textarea {
            padding: 14px 18px;
            background: #0D0D0D;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #E50914;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 30px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary { background: #E50914; color: #fff; }
        .btn-primary:hover { background: #b2070f; transform: scale(1.02); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.08); }
        .btn-block { width: 100%; justify-content: center; }
        .file-upload {
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .file-upload:hover { border-color: #E50914; background: rgba(229, 9, 20, 0.05); }
        .file-upload .material-icons { font-size: 48px; color: #666; }
        .file-upload p { color: #666; margin: 8px 0 0; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #2A2A2A;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-bar .fill {
            height: 100%;
            background: #E50914;
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s ease;
        }
        .video-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .video-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: #0D0D0D;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .video-item .info h4 { font-size: 17px; color: #fff; margin: 0; }
        .video-item .info span { font-size: 14px; color: #666; }
        .video-item .actions { display: flex; gap: 8px; }
        .video-item .actions .btn-sm { padding: 6px 14px; font-size: 14px; border-radius: 8px; }
        .link-copy {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #0D0D0D;
            padding: 10px 14px;
            border-radius: 8px;
            margin-top: 8px;
        }
        .link-copy input {
            flex: 1;
            background: none;
            border: none;
            color: #3498db;
            font-size: 15px;
            outline: none;
        }
        .link-copy button {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
        }
        .link-copy button:hover { color: #fff; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📤 Subir Video</h1>
        <p>Sube un video y obtén un enlace público para compartir</p>

        <form id="uploadForm">
            <div class="form-group">
                <label>📌 Título del Video *</label>
                <input type="text" id="videoTitle" placeholder="Ej: Mi video increíble" required>
            </div>

            <div class="form-group">
                <label>📝 Descripción</label>
                <textarea id="videoDescription" rows="3" placeholder="Descripción del video..."></textarea>
            </div>

            <div class="form-group">
                <label>🎬 Archivo de Video *</label>
                <div class="file-upload" id="fileDrop">
                    <span class="material-icons">cloud_upload</span>
                    <p>Arrastra tu video aquí o haz clic para seleccionar</p>
                    <input type="file" id="videoFile" accept="video/*" style="display:none;">
                </div>
                <div id="fileInfo" style="display:none; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; margin-top: 8px;">
                    <span id="fileName"></span>
                    <span id="fileSize" style="color:#666; margin-left: 12px;"></span>
                </div>
            </div>

            <div class="progress-bar" id="progressContainer">
                <div class="fill" id="progressFill"></div>
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="uploadBtn">
                <span class="material-icons">upload</span> Subir Video
            </button>
        </form>
    </div>

    <div class="card">
        <h2>📋 Mis Videos</h2>
        <div id="videoList" class="video-list">
            <p style="color:#666; text-align:center; padding:20px;">No has subido ningún video aún</p>
        </div>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<script>
// ==================== CONFIGURACIÓN ====================
const firebaseConfig = {
    apiKey: "AIzaSyBAdvlj4qzHSaPUIRIW5F51mHlnzoy1_es",
    authDomain: "tely2-245d5.firebaseapp.com",
    databaseURL: "https://tely2-245d5-default-rtdb.firebaseio.com",
    projectId: "tely2-245d5",
    storageBucket: "tely2-245d5.appspot.com",
    messagingSenderId: "37996516235",
    appId: "1:37996516235:web:11f3d73fdc683de9d9558e",
    measurementId: "G-L8W50JK7N3"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const database = firebase.database();
const storage = firebase.storage();

let selectedFile = null;
let currentUser = null;

// ==================== AUTENTICACIÓN ====================
auth.onAuthStateChanged(function(user) {
    if (!user) {
        window.location.href = 'login.html';
        return;
    }
    currentUser = user;
    loadVideos();
});

// ==================== SELECCIONAR ARCHIVO ====================
const fileDrop = document.getElementById('fileDrop');
const fileInput = document.getElementById('videoFile');

fileDrop.addEventListener('click', function() {
    fileInput.click();
});

fileDrop.addEventListener('dragover', function(e) {
    e.preventDefault();
    this.style.borderColor = '#E50914';
});

fileDrop.addEventListener('dragleave', function(e) {
    e.preventDefault();
    this.style.borderColor = 'rgba(255,255,255,0.15)';
});

fileDrop.addEventListener('drop', function(e) {
    e.preventDefault();
    this.style.borderColor = 'rgba(255,255,255,0.15)';
    if (e.dataTransfer.files.length > 0) {
        handleFile(e.dataTransfer.files[0]);
    }
});

fileInput.addEventListener('change', function() {
    if (this.files.length > 0) {
        handleFile(this.files[0]);
    }
});

function handleFile(file) {
    if (!file.type.startsWith('video/')) {
        alert('❌ Por favor selecciona un archivo de video');
        return;
    }
    selectedFile = file;
    document.getElementById('fileInfo').style.display = 'block';
    document.getElementById('fileName').textContent = '📹 ' + file.name;
    document.getElementById('fileSize').textContent = formatFileSize(file.size);
}

function formatFileSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
}

// ==================== SUBIR VIDEO ====================
document.getElementById('uploadForm').addEventListener('submit', function(e) {
    e.preventDefault();
    if (!selectedFile) {
        alert('❌ Selecciona un video primero');
        return;
    }

    const title = document.getElementById('videoTitle').value.trim();
    if (!title) {
        alert('❌ Ingresa un título para el video');
        return;
    }

    const description = document.getElementById('videoDescription').value.trim();
    const btn = document.getElementById('uploadBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top:2px solid #fff;border-radius:50%;animation:spin 0.8s linear infinite;"></span> Subiendo...';

    const fileName = Date.now() + '_' + selectedFile.name;
    const storageRef = storage.ref('videos/' + currentUser.uid + '/' + fileName);
    const uploadTask = storageRef.put(selectedFile);

    uploadTask.on('state_changed',
        function(snapshot) {
            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        },
        function(error) {
            alert('❌ Error al subir: ' + error.message);
            btn.disabled = false;
            btn.innerHTML = '<span class="material-icons">upload</span> Subir Video';
        },
        function() {
            // Obtener la URL de descarga
            uploadTask.snapshot.ref.getDownloadURL().then(function(downloadURL) {
                // Guardar en la base de datos
                const videoData = {
                    title: title,
                    description: description,
                    url: downloadURL,
                    fileName: fileName,
                    size: selectedFile.size,
                    type: selectedFile.type,
                    createdAt: firebase.database.ServerValue.TIMESTAMP,
                    userId: currentUser.uid,
                    userName: currentUser.displayName || 'Usuario'
                };

                database.ref('videos').push(videoData).then(function() {
                    alert('✅ Video subido exitosamente!');
                    btn.disabled = false;
                    btn.innerHTML = '<span class="material-icons">upload</span> Subir Video';
                    document.getElementById('progressFill').style.width = '0%';
                    document.getElementById('fileInfo').style.display = 'none';
                    document.getElementById('videoTitle').value = '';
                    document.getElementById('videoDescription').value = '';
                    selectedFile = null;
                    fileInput.value = '';
                    loadVideos();
                });
            });
        }
    );
});

// ==================== CARGAR VIDEOS ====================
function loadVideos() {
    const container = document.getElementById('videoList');

    database.ref('videos').orderByChild('createdAt').on('value', function(snapshot) {
        const data = snapshot.val();
        let videos = [];

        if (data) {
            Object.keys(data).forEach(function(key) {
                videos.push({ id: key, ...data[key] });
            });
            videos.reverse();
        }

        if (videos.length === 0) {
            container.innerHTML = '<p style="color:#666; text-align:center; padding:20px;">No has subido ningún video aún</p>';
            return;
        }

        container.innerHTML = videos.map(function(video) {
            const date = video.createdAt ? new Date(video.createdAt).toLocaleDateString() : 'Fecha desconocida';
            const isOwner = currentUser && video.userId === currentUser.uid;

            return `
                <div class="video-item">
                    <div class="info">
                        <h4>${video.title}</h4>
                        <span>${video.type || 'Video'} • ${video.size ? formatFileSize(video.size) : ''} • ${date}</span>
                        ${video.url ? `
                            <div class="link-copy">
                                <input type="text" value="${video.url}" readonly id="link_${video.id}">
                                <button onclick="copyLink('${video.id}')">
                                    <span class="material-icons" style="font-size:20px;">content_copy</span>
                                </button>
                                <a href="${video.url}" target="_blank" style="color:#3498db;text-decoration:none;">
                                    <span class="material-icons" style="font-size:20px;">open_in_new</span>
                                </a>
                            </div>
                        ` : ''}
                    </div>
                    <div class="actions">
                        ${isOwner ? `
                            <button class="btn btn-secondary btn-sm" onclick="deleteVideo('${video.id}')">🗑️</button>
                        ` : ''}
                        <button class="btn btn-primary btn-sm" onclick="playVideo('${video.id}')">▶ Ver</button>
                    </div>
                </div>
            `;
        }).join('');
    });
}

// ==================== COPIAR ENLACE ====================
function copyLink(id) {
    const input = document.getElementById('link_' + id);
    if (input) {
        input.select();
        document.execCommand('copy');
        alert('✅ Enlace copiado al portapapeles');
    }
}

// ==================== VER VIDEO ====================
function playVideo(id) {
    database.ref('videos/' + id).once('value', function(snapshot) {
        const data = snapshot.val();
        if (data && data.url) {
            // Abrir el video en una nueva ventana o en el reproductor
            window.open(data.url, '_blank');
        } else {
            alert('❌ No se encontró el video');
        }
    });
}

// ==================== ELIMINAR VIDEO ====================
function deleteVideo(id) {
    if (!confirm('¿Eliminar este video?')) return;

    database.ref('videos/' + id).once('value', function(snapshot) {
        const data = snapshot.val();
        if (data && data.fileName) {
            const storageRef = storage.ref('videos/' + currentUser.uid + '/' + data.fileName);
            storageRef.delete().then(function() {
                database.ref('videos/' + id).remove().then(function() {
                    alert('✅ Video eliminado');
                    loadVideos();
                });
            }).catch(function(error) {
                alert('❌ Error al eliminar: ' + error.message);
            });
        } else {
            database.ref('videos/' + id).remove().then(function() {
                alert('✅ Video eliminado');
                loadVideos();
            });
        }
    });
}

// ==================== CERRAR SESIÓN ====================
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { /* cerrar modales */ }
});

console.log('✅ Admin de videos cargado');
</script>
</body>
</html>
