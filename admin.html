<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Cine - Admin</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <header class="header-premium">
        <div class="header-premium-content">
            <button class="menu-btn" onclick="window.location.href='index.html'">
                <span class="material-icons">arrow_back</span>
            </button>
            <div class="logo-premium">⚙️ Admin</div>
            <div></div>
        </div>
    </header>

    <main class="main-premium">
        <div class="admin-container">
            <div class="admin-header">
                <h2>Panel de Administración</h2>
                <p>Gestiona el contenido personalizado</p>
            </div>

            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="manage">📋 Gestionar</button>
                <button class="admin-tab" data-tab="add">➕ Agregar</button>
                <button class="admin-tab" data-tab="stats">📊 Estadísticas</button>
            </div>

            <!-- GESTIONAR -->
            <div class="admin-tab-content active" id="tab-manage">
                <div class="manage-header">
                    <h3>Contenido Personalizado</h3>
                    <div class="search-box small">
                        <input type="text" id="searchManage" placeholder="🔍 Buscar...">
                    </div>
                </div>
                <div id="manageGrid" class="manage-grid"></div>
            </div>

            <!-- AGREGAR -->
            <div class="admin-tab-content" id="tab-add">
                <form id="adminForm" class="admin-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>📌 Título *</label>
                            <input type="text" id="title" placeholder="Ej: Inception" required>
                        </div>
                        <div class="form-group">
                            <label>📅 Año</label>
                            <input type="text" id="year" placeholder="Ej: 2010">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>🖼️ URL del Poster</label>
                            <input type="url" id="poster" placeholder="https://image.tmdb.org/t/p/w500/...">
                        </div>
                        <div class="form-group">
                            <label>🎭 Tipo *</label>
                            <select id="type">
                                <option value="pelicula">🎬 Película</option>
                                <option value="serie">📺 Serie</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>🎬 ID de TMDB *</label>
                            <input type="text" id="tmdbId" placeholder="Ej: 27205" required>
                            <small>ID de la película/serie en TMDB</small>
                        </div>
                        <div class="form-group">
                            <label>🔗 URL Personalizada</label>
                            <input type="url" id="customUrl" placeholder="https://ejemplo.com/video">
                            <small>Opcional - reemplaza el enlace automático</small>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>📝 Descripción</label>
                        <textarea id="description" rows="3" placeholder="Describe el contenido..."></textarea>
                    </div>

                    <div class="episode-manager" id="episodeManager">
                        <h4>📺 Episodios (para series)</h4>
                        <div id="episodeList">
                            <div class="episode-item">
                                <input type="text" placeholder="Temporada 1 - Episodio 1" value="Temporada 1 - Episodio 1">
                                <input type="text" placeholder="URL del video (opcional)">
                                <button type="button" class="btn btn-danger btn-sm" onclick="removeEpisode(this)">✖</button>
                            </div>
                        </div>
                        <button type="button" class="btn btn-primary btn-sm" onclick="addEpisode()">➕ Agregar Episodio</button>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">💾 Guardar</button>
                        <button type="reset" class="btn btn-secondary">🗑️ Limpiar</button>
                    </div>
                </form>
            </div>

            <!-- ESTADÍSTICAS -->
            <div class="admin-tab-content" id="tab-stats">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">🎬</div>
                        <div class="stat-info">
                            <h3 id="totalPeliculas">0</h3>
                            <p>Películas</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📺</div>
                        <div class="stat-info">
                            <h3 id="totalSeries">0</h3>
                            <p>Series</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📦</div>
                        <div class="stat-info">
                            <h3 id="totalContenido">0</h3>
                            <p>Total</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
