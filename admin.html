<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Cine - Admin</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .btn-magic {
            background: linear-gradient(135deg, #E50914, #f39c12);
            color: #fff;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(229, 9, 20, 0.4);
        }

        .btn-magic:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 30px rgba(229, 9, 20, 0.6);
        }

        .btn-magic:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-magic .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .btn-magic.loading .spinner {
            display: inline-block;
        }

        .btn-magic.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-bar-container {
            display: none;
            margin: 20px 0;
            background: #1A1A1A;
            border-radius: 8px;
            overflow: hidden;
            height: 30px;
            position: relative;
        }

        .progress-bar-container.active {
            display: block;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #E50914, #f39c12);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 16px 0;
        }

        .stat-box {
            background: #1A1A1A;
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #2A2A2A;
        }

        .stat-box .number {
            font-size: 28px;
            font-weight: 700;
            color: #E50914;
        }

        .stat-box .label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .log-container {
            background: #0D0D0D;
            border-radius: 8px;
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            color: #888;
            margin-top: 12px;
            border: 1px solid #1A1A1A;
        }

        .log-container .log-item {
            padding: 2px 0;
            border-bottom: 1px solid #1A1A1A;
        }

        .log-container .log-item.success {
            color: #00b894;
        }

        .log-container .log-item.error {
            color: #E50914;
        }

        .log-container .log-item.info {
            color: #3498db;
        }
    </style>
</head>
<body>
    <header class="header-premium">
        <div class="header-premium-content">
            <button class="menu-btn" onclick="window.location.href='index.html'">
                <span class="material-icons">arrow_back</span>
            </button>
            <div class="logo-premium">⚙️ Admin</div>
            <div></div>
        </div>
    </header>

    <main class="main-premium">
        <div class="admin-container">
            <div class="admin-header">
                <h2>Panel de Administración</h2>
                <p>Agrega TODO el contenido de TMDB con un solo clic</p>
            </div>

            <!-- BOTÓN MÁGICO -->
            <button class="btn-magic" id="btnMagic">
                <span class="spinner"></span>
                <span class="btn-text">✨ AGREGAR TODAS LAS PELÍCULAS Y SERIES</span>
            </button>

            <!-- PROGRESS BAR -->
            <div class="progress-bar-container" id="progressContainer">
                <div class="progress-bar-fill" id="progressFill">0%</div>
            </div>

            <!-- ESTADÍSTICAS -->
            <div class="stats-container" id="statsContainer">
                <div class="stat-box">
                    <div class="number" id="statMovies">0</div>
                    <div class="label">🎬 Películas</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="statSeries">0</div>
                    <div class="label">📺 Series</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="statTotal">0</div>
                    <div class="label">📦 Total</div>
                </div>
            </div>

            <!-- LOG -->
            <div class="log-container" id="logContainer">
                <div class="log-item info">📋 Esperando acción...</div>
            </div>

            <!-- CONTENIDO PERSONALIZADO -->
            <div style="margin-top: 24px;">
                <h3 style="color:#888;font-size:14px;margin-bottom:12px;">📋 Contenido guardado en Firebase</h3>
                <div id="manageGrid" class="manage-grid"></div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // ==================== VARIABLES ====================
        const TMDB_API_KEY = '6196750b1fd09dd276a6106e75ee34f6';
        const TMDB_BASE_URL = 'https://api.themoviedb.org/3';
        const IMAGE_BASE_URL = 'https://image.tmdb.org/t/p/w500';

        let isRunning = false;
        let totalProcessed = 0;
        let totalMovies = 0;
        let totalSeries = 0;

        // ==================== INICIALIZACIÓN ====================
        document.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged(user => {
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }
                loadManageContent();
                loadStats();
            });

            document.getElementById('btnMagic').addEventListener('click', startImport);
        });

        // ==================== BOTÓN MÁGICO ====================
        async function startImport() {
            if (isRunning) return;
            
            if (!confirm('⚠️ ¿Estás seguro? Esto agregará TODAS las películas y series de TMDB a Firebase.\n\nPuede tomar varios minutos.')) {
                return;
            }

            isRunning = true;
            const btn = document.getElementById('btnMagic');
            btn.classList.add('loading');
            btn.disabled = true;

            const progressContainer = document.getElementById('progressContainer');
            progressContainer.classList.add('active');
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressFill').textContent = '0%';

            clearLog();
            addLog('🚀 Iniciando importación masiva...', 'info');

            try {
                // 1. Obtener TODAS las películas
                addLog('📥 Obteniendo películas de TMDB...', 'info');
                const movies = await getAllMovies();
                totalMovies = movies.length;
                addLog(`✅ ${totalMovies} películas encontradas`, 'success');

                // 2. Obtener TODAS las series
                addLog('📥 Obteniendo series de TMDB...', 'info');
                const series = await getAllSeries();
                totalSeries = series.length;
                addLog(`✅ ${totalSeries} series encontradas`, 'success');

                const total = totalMovies + totalSeries;
                document.getElementById('statTotal').textContent = total;

                // 3. Guardar en Firebase
                let processed = 0;

                // Guardar películas
                for (const movie of movies) {
                    await saveContent({
                        id: movie.id,
                        title: movie.title,
                        year: movie.release_date ? movie.release_date.substring(0, 4) : 'N/A',
                        poster: movie.poster_path ? `${IMAGE_BASE_URL}${movie.poster_path}` : 'https://via.placeholder.com/300x450/1A1A1A/ffffff?text=No+Image',
                        type: 'pelicula',
                        description: movie.overview || 'Sin descripción',
                        tmdbId: movie.id,
                        videoUrl: `https://unlimplay.co/play/movie/${movie.id}`,
                        episodes: [],
                        vote_average: movie.vote_average || 0
                    });
                    processed++;
                    updateProgress(processed, total, `Película ${processed}/${totalMovies}`);
                    addLog(`🎬 ${movie.title} (${movie.release_date ? movie.release_date.substring(0, 4) : 'N/A'})`, 'success');
                }

                // Guardar series
                for (const serie of series) {
                    // Obtener detalles de la serie para las temporadas
                    const details = await getSeriesDetails(serie.id);
                    const episodes = [];
                    
                    if (details && details.seasons) {
                        const validSeasons = details.seasons.filter(s => s.season_number > 0);
                        for (const season of validSeasons) {
                            const epCount = Math.min(season.episode_count || 10, 20);
                            for (let i = 1; i <= epCount; i++) {
                                episodes.push({
                                    title: `Temporada ${season.season_number} - Episodio ${i}`,
                                    url: `https://unlimplay.co/play/tv/${serie.id}/${season.season_number}/${i}`
                                });
                            }
                        }
                    }

                    await saveContent({
                        id: serie.id,
                        title: serie.name,
                        year: serie.first_air_date ? serie.first_air_date.substring(0, 4) : 'N/A',
                        poster: serie.poster_path ? `${IMAGE_BASE_URL}${serie.poster_path}` : 'https://via.placeholder.com/300x450/1A1A1A/ffffff?text=No+Image',
                        type: 'serie',
                        description: serie.overview || 'Sin descripción',
                        tmdbId: serie.id,
                        videoUrl: `https://unlimplay.co/play/tv/${serie.id}/1/1`,
                        episodes: episodes,
                        vote_average: serie.vote_average || 0
                    });
                    processed++;
                    updateProgress(processed, total, `Serie ${processed - totalMovies}/${totalSeries}`);
                    addLog(`📺 ${serie.name} (${serie.first_air_date ? serie.first_air_date.substring(0, 4) : 'N/A'}) - ${episodes.length} episodios`, 'success');
                }

                // Actualizar estadísticas
                document.getElementById('statMovies').textContent = totalMovies;
                document.getElementById('statSeries').textContent = totalSeries;
                document.getElementById('statTotal').textContent = total;

                addLog(`✅ ¡COMPLETADO! ${total} contenidos guardados en Firebase`, 'success');

            } catch (error) {
                console.error('Error:', error);
                addLog(`❌ Error: ${error.message}`, 'error');
            }

            isRunning = false;
            btn.classList.remove('loading');
            btn.disabled = false;
            document.getElementById('progressFill').textContent = '100% ✅';
            loadManageContent();
        }

        // ==================== FUNCIONES DE TMDB ====================
        async function getAllMovies() {
            let allMovies = [];
            let page = 1;
            let hasMore = true;

            while (hasMore && page <= 10) {
                try {
                    const response = await fetch(
                        `${TMDB_BASE_URL}/movie/popular?api_key=${TMDB_API_KEY}&language=es-ES&page=${page}`
                    );
                    const data = await response.json();
                    if (data.results && data.results.length > 0) {
                        allMovies = [...allMovies, ...data.results];
                        page++;
                    } else {
                        hasMore = false;
                    }
                } catch (error) {
                    console.error('Error:', error);
                    hasMore = false;
                }
            }
            return allMovies;
        }

        async function getAllSeries() {
            let allSeries = [];
            let page = 1;
            let hasMore = true;

            while (hasMore && page <= 10) {
                try {
                    const response = await fetch(
                        `${TMDB_BASE_URL}/tv/popular?api_key=${TMDB_API_KEY}&language=es-ES&page=${page}`
                    );
                    const data = await response.json();
                    if (data.results && data.results.length > 0) {
                        allSeries = [...allSeries, ...data.results];
                        page++;
                    } else {
                        hasMore = false;
                    }
                } catch (error) {
                    console.error('Error:', error);
                    hasMore = false;
                }
            }
            return allSeries;
        }

        async function getSeriesDetails(id) {
            try {
                const response = await fetch(
                    `${TMDB_BASE_URL}/tv/${id}?api_key=${TMDB_API_KEY}&language=es-ES`
                );
                return await response.json();
            } catch (error) {
                return null;
            }
        }

        // ==================== GUARDAR EN FIREBASE ====================
        async function saveContent(content) {
            try {
                await database.ref(`content/${content.id}`).set({
                    ...content,
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
                return true;
            } catch (error) {
                console.error('Error guardando:', error);
                return false;
            }
        }

        // ==================== PROGRESS ====================
        function updateProgress(current, total, label) {
            const percent = Math.round((current / total) * 100);
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressFill').textContent = `${percent}% - ${label || ''}`;
        }

        // ==================== LOG ====================
        function addLog(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const div = document.createElement('div');
            div.className = `log-item ${type}`;
            div.textContent = message;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function clearLog() {
            document.getElementById('logContainer').innerHTML = '';
        }

        // ==================== CARGAR CONTENIDO GUARDADO ====================
        function loadManageContent() {
            const grid = document.getElementById('manageGrid');

            database.ref('content').orderByChild('createdAt').on('value', (snapshot) => {
                const data = snapshot.val();
                let items = [];

                if (data) {
                    Object.keys(data).forEach(key => {
                        items.push({
                            id: key,
                            ...data[key]
                        });
                    });
                    items.reverse();
                }

                if (items.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state-premium" style="grid-column:1/-1;">
                            <div class="empty-icon">📭</div>
                            <p>No hay contenido guardado</p>
                            <p style="color:#666;font-size:13px;">Presiona el botón "AGREGAR TODAS LAS PELÍCULAS Y SERIES"</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = items.slice(0, 50).map(item => `
                    <div class="manage-item">
                        <div class="manage-item-info">
                            <img src="${item.poster}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/50x75/1A1A1A/ffffff?text=No+Image'">
                            <div>
                                <h4>${item.title}</h4>
                                <p>${item.year || 'Año desconocido'} • ${item.type === 'pelicula' ? '🎬 Película' : '📺 Serie'} • ${item.episodes?.length || 0} episodios</p>
                            </div>
                        </div>
                        <div class="manage-item-actions">
                            <button class="btn btn-danger btn-sm" onclick="deleteContent('${item.id}')">🗑️</button>
                        </div>
                    </div>
                `).join('');

                // Mostrar total
                document.getElementById('statTotal').textContent = items.length;
                const movies = items.filter(i => i.type === 'pelicula');
                const series = items.filter(i => i.type === 'serie');
                document.getElementById('statMovies').textContent = movies.length;
                document.getElementById('statSeries').textContent = series.length;
            });
        }

        async function deleteContent(id) {
            if (confirm('¿Estás seguro de eliminar este contenido?')) {
                try {
                    await database.ref(`content/${id}`).remove();
                    alert('✅ Contenido eliminado');
                } catch (error) {
                    alert('❌ Error: ' + error.message);
                }
            }
        }

        function loadStats() {
            database.ref('content').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                let movies = 0;
                let series = 0;
                Object.values(data).forEach(item => {
                    if (item.type === 'pelicula') movies++;
                    else if (item.type === 'serie') series++;
                });
                document.getElementById('statMovies').textContent = movies;
                document.getElementById('statSeries').textContent = series;
                document.getElementById('statTotal').textContent = movies + series;
            });
        }

        console.log('✅ Admin Magic cargado');
    </script>
</body>
</html>
