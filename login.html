<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Cine - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .auth-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0D0D0D;
            padding: 20px;
        }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>🎬 Mi Cine</h1>
                <p>Inicia sesión para continuar</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label>📧 Correo Electrónico</label>
                    <input type="email" id="loginEmail" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label>🔒 Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="********" required>
                    <a href="recuperar.html" class="forgot-password">¿Olvidaste tu contraseña?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Iniciar Sesión</button>
                
                <div class="auth-divider">
                    <span>o continúa con</span>
                </div>
                
                <button type="button" id="googleLogin" class="btn btn-google btn-block">
                    <span class="material-icons">google</span>
                    Google
                </button>
            </form>

            <div class="auth-footer">
                <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    
    <script>
        // ===== CORRECCIÓN: No redirigir si ya está logueado =====
        // Esta función evita que se redirija automáticamente si ya está logueado
        auth.onAuthStateChanged(function(user) {
            if (user) {
                // Si ya está logueado, redirigir al inicio
                const returnUrl = localStorage.getItem('returnUrl') || 'index.html';
                localStorage.removeItem('returnUrl');
                window.location.href = returnUrl;
            }
        });

        // ===== LOGIN CON EMAIL =====
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            // Deshabilitar botón para evitar doble clic
            const btn = this.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = '⏳ Cargando...';

            auth.signInWithEmailAndPassword(email, password)
                .then(function() {
                    const returnUrl = localStorage.getItem('returnUrl') || 'index.html';
                    localStorage.removeItem('returnUrl');
                    window.location.href = returnUrl;
                })
                .catch(function(error) {
                    btn.disabled = false;
                    btn.textContent = 'Iniciar Sesión';
                    
                    let mensaje = '❌ Error: ';
                    switch(error.code) {
                        case 'auth/user-not-found':
                            mensaje += 'Usuario no encontrado';
                            break;
                        case 'auth/wrong-password':
                            mensaje += 'Contraseña incorrecta';
                            break;
                        case 'auth/invalid-email':
                            mensaje += 'Correo electrónico inválido';
                            break;
                        case 'auth/too-many-requests':
                            mensaje += 'Demasiados intentos. Espera un momento.';
                            break;
                        default:
                            mensaje += error.message;
                    }
                    alert(mensaje);
                });
        });

        // ===== LOGIN CON GOOGLE =====
        document.getElementById('googleLogin').addEventListener('click', function() {
            const provider = new firebase.auth.GoogleAuthProvider();
            
            // Deshabilitar botón
            this.disabled = true;
            this.textContent = '⏳ Cargando...';

            auth.signInWithPopup(provider)
                .then(function() {
                    const returnUrl = localStorage.getItem('returnUrl') || 'index.html';
                    localStorage.removeItem('returnUrl');
                    window.location.href = returnUrl;
                })
                .catch(function(error) {
                    alert('❌ Error con Google: ' + error.message);
                    document.getElementById('googleLogin').disabled = false;
                    document.getElementById('googleLogin').innerHTML = '<span class="material-icons">google</span> Google';
                });
        });

        console.log('✅ Login cargado correctamente');
    </script>
</body>
</html>
