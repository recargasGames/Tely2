<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Cine - Registro</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>🎬 Mi Cine</h1>
                <p>Crea tu cuenta gratis</p>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label>👤 Nombre Completo</label>
                    <input type="text" id="registerName" placeholder="Tu nombre" required>
                </div>
                <div class="form-group">
                    <label>📧 Correo Electrónico</label>
                    <input type="email" id="registerEmail" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label>🔒 Contraseña</label>
                    <input type="password" id="registerPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
                <div class="form-group">
                    <label>🔒 Confirmar Contraseña</label>
                    <input type="password" id="registerConfirm" placeholder="Repite la contraseña" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Registrarse</button>
                
                <div class="auth-divider">
                    <span>o continúa con</span>
                </div>
                
                <button type="button" id="googleRegister" class="btn btn-google btn-block">
                    <span class="material-icons">google</span>
                    Google
                </button>
            </form>

            <div class="auth-footer">
                <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            auth.onAuthStateChanged(function(user) {
                if (user) {
                    window.location.href = 'index.html';
                }
            });

            document.getElementById('registerForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const name = document.getElementById('registerName').value;
                const email = document.getElementById('registerEmail').value;
                const password = document.getElementById('registerPassword').value;
                const confirm = document.getElementById('registerConfirm').value;

                if (password !== confirm) {
                    alert('❌ Las contraseñas no coinciden');
                    return;
                }

                if (password.length < 6) {
                    alert('❌ La contraseña debe tener al menos 6 caracteres');
                    return;
                }

                auth.createUserWithEmailAndPassword(email, password)
                    .then(function(userCredential) {
                        return userCredential.user.updateProfile({
                            displayName: name
                        });
                    })
                    .then(function() {
                        alert('✅ Registro exitoso!');
                        window.location.href = 'index.html';
                    })
                    .catch(function(error) {
                        let mensaje = '❌ Error: ';
                        switch(error.code) {
                            case 'auth/email-already-in-use':
                                mensaje += 'Este correo ya está registrado';
                                break;
                            case 'auth/invalid-email':
                                mensaje += 'Correo electrónico inválido';
                                break;
                            case 'auth/weak-password':
                                mensaje += 'La contraseña debe tener al menos 6 caracteres';
                                break;
                            default:
                                mensaje += error.message;
                        }
                        alert(mensaje);
                    });
            });

            document.getElementById('googleRegister').addEventListener('click', function() {
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider)
                    .then(function() {
                        window.location.href = 'index.html';
                    })
                    .catch(function(error) {
                        alert('❌ Error con Google: ' + error.message);
                    });
            });
        });
    </script>
</body>
</html>
