<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Cine - Películas</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="header-content">
        <button class="menu-btn" onclick="window.location.href='index.html'">
            <span class="material-icons">arrow_back</span>
        </button>
        <div class="logo">🎬 Mi Cine</div>
        <div></div>
    </div>
</header>

<main class="main-content">
    <div class="section-header">
        <h2 class="section-title">🎬 Películas</h2>
    </div>
    <div class="content-grid" id="peliculasGrid"></div>
</main>

<nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item">🏠 Inicio</a>
    <a href="peliculas.html" class="bottom-nav-item active">🎬 Películas</a>
    <a href="series.html" class="bottom-nav-item">📺 Series</a>
    <a href="mi-lista.html" class="bottom-nav-item">🔖 Mi Lista</a>
    <a href="perfil.html" class="bottom-nav-item">👤 Perfil</a>
</nav>

<div id="modal" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">
            <span class="material-icons">close</span>
        </button>
        <div id="modalBody"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>

<script>
let allMovies = [];
let isLoggedIn = false;
let currentUser = null;

auth.onAuthStateChanged(function(user) {
    if (user) { isLoggedIn = true; currentUser = user; }
    else { isLoggedIn = false; currentUser = null; }
    loadMovies();
});

function goToLogin() { window.location.href = 'login.html'; }
function checkAuth() {
    if (!isLoggedIn) {
        if (confirm('🔒 Inicia sesión para ver contenido')) { goToLogin(); }
        return false;
    }
    return true;
}
function playContent(id, type) {
    if (!checkAuth()) return;
    window.location.href = 'reproductor.html?id=' + id + '&type=' + type;
}

function loadMovies() {
    const grid = document.getElementById('peliculasGrid');
    grid.innerHTML = '<div class="loading">Cargando...</div>';

    database.ref('content').orderByChild('createdAt').on('value', function(snapshot) {
        const data = snapshot.val();
        allMovies = [];
        if (data) {
            Object.keys(data).forEach(function(key) {
                const item = data[key];
                if (item.type === 'pelicula') allMovies.push({ id: key, ...item });
            });
            allMovies.reverse();
        }
        renderMovies();
    });
}

function renderMovies() {
    const grid = document.getElementById('peliculasGrid');
    if (allMovies.length === 0) {
        grid.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">🎬</div>
                <h3>No hay películas</h3>
                <button class="btn btn-primary" onclick="window.location.href='admin.html'">📥 Sincronizar</button>
            </div>
        `;
        return;
    }
    grid.innerHTML = allMovies.map(m => `
        <div class="movie-card" onclick="openModal('${m.id}')">
            <div class="card-image">
                <img src="${m.poster}" alt="${m.title}" loading="lazy">
                <div class="card-badge">${m.vote_average ? '⭐ ' + m.vote_average.toFixed(1) : 'Nuevo'}</div>
                <div class="card-overlay">
                    <button class="play-btn" onclick="event.stopPropagation(); playContent('${m.id}','pelicula')">
                        <span class="material-icons">play_arrow</span>
                    </button>
                </div>
            </div>
            <div class="card-info">
                <h4>${m.title}</h4>
                <span>${m.year || 'N/A'}</span>
            </div>
        </div>
    `).join('');
}

function openModal(id) {
    if (!checkAuth()) return;
    const item = allMovies.find(c => c.id === id);
    if (!item) return;

    const modal = document.getElementById('modal');
    const body = document.getElementById('modalBody');

    body.innerHTML = `
        <div class="modal-hero" style="background-image:url(${item.poster})">
            <div class="modal-hero-gradient"></div>
            <div class="modal-hero-content">
                <img src="${item.poster}" alt="${item.title}" class="modal-poster">
                <div>
                    <h2>${item.title}</h2>
                    <div class="modal-meta">
                        <span>${item.year || 'N/A'}</span>
                        <span class="rating">⭐ ${item.vote_average || 'N/A'}</span>
                    </div>
                    <div class="modal-actions">
                        <button class="btn btn-primary" onclick="playContent('${id}','pelicula')">
                            <span class="material-icons">play_arrow</span> Reproducir
                        </button>
                        <button class="btn btn-secondary" onclick="toggleFavorite('${id}')">
                            <span class="material-icons">favorite_border</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-body">
            <p>${item.description || 'Sin descripción'}</p>
        </div>
    `;

    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
    document.body.style.overflow = 'auto';
}

function toggleFavorite(id) {
    if (!isLoggedIn) { goToLogin(); return; }
    const ref = database.ref('favorites/' + currentUser.uid + '/' + id);
    ref.once('value').then(function(snap) {
        if (snap.exists()) { ref.remove(); alert('❌ Eliminado'); }
        else { ref.set(true); alert('✅ Agregado'); }
    });
}

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

console.log('✅ Películas cargado');
</script>
</body>
</html>
